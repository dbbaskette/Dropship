spring:
  ai:
    mcp:
      server:
        name: dropship
        version: 0.1.0
        protocol: STREAMABLE
        type: SYNC
        annotation-scanner:
          enabled: true

cf:
  client-id: test-client-id
  client-secret: test-client-secret
  username:
  password:
  skip-ssl-validation: true

dropship:
  sandbox-org: test-org
  sandbox-space: test-space
  cf-api-url: https://api.test.cf.example.com
  max-task-memory-mb: 2048
  max-task-disk-mb: 4096
  max-task-timeout-seconds: 900
  default-task-memory-mb: 512
  default-staging-memory-mb: 1024
  default-staging-disk-mb: 2048
  app-name-prefix: "dropship-"
