---
applications:
  - name: dropship-mcp
    memory: 2G
    disk_quota: 2G
    instances: 1
    buildpacks:
      - java_buildpack_offline
    path: target/dropship-0.1.0-SNAPSHOT.jar
    health-check-type: http
    health-check-http-endpoint: /actuator/health
    timeout: 120

    env:
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
      JAVA_OPTS: '-XX:MaxDirectMemorySize=256M'
      SPRING_PROFILES_ACTIVE: cloud
      # ------------------------------------------------------------------
      # All CF configuration is optional at deploy time.
      # Credentials are provided per-user via MCP HTTP headers.
      # Set these via `cf set-env` or a vars file if you want
      # server-level defaults. See docs/cf-setup.md for details.
      # ------------------------------------------------------------------

    # ------------------------------------------------------------------
    # Service bindings
    # ------------------------------------------------------------------
    # Uncomment the services block below once a UAA service instance has
    # been created.  The bound credentials will be available via VCAP_SERVICES
    # and can be referenced in application-cloud.yml.
    #
    # To create the service instance:
    #   cf create-service p-identity standard dropship-uaa
    #
    # Then uncomment and push:
    # services:
    #   - dropship-uaa
