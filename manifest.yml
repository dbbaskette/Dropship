---
applications:
  - name: dropship-mcp
    memory: 512M
    disk_quota: 1G
    instances: 1
    buildpacks:
      - java_buildpack
    path: target/dropship-0.1.0-SNAPSHOT.jar
    health-check-type: http
    health-check-http-endpoint: /actuator/health
    timeout: 120

    env:
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
      SPRING_PROFILES_ACTIVE: cloud
      # ------------------------------------------------------------------
      # CF UAA client credentials (required).
      # Set these via `cf set-env` or a vars file — do not commit secrets.
      # ------------------------------------------------------------------
      CF_CLIENT_ID: ((cf-client-id))
      CF_CLIENT_SECRET: ((cf-client-secret))
      # ------------------------------------------------------------------
      # CF API URL.  The cloud profile auto-detects this from
      # VCAP_APPLICATION, so this env var acts as an explicit override.
      # Set it when pushing to a foundation where VCAP metadata is
      # unavailable or when running locally with the cloud profile.
      # ------------------------------------------------------------------
      CF_API_URL: ((cf-api-url))
      # ------------------------------------------------------------------
      # Sandbox org/space where Dropship pushes and runs agent workloads.
      # Override these per environment (e.g., cf set-env or vars file).
      # ------------------------------------------------------------------
      DROPSHIP_SANDBOX_ORG: ((sandbox-org))
      DROPSHIP_SANDBOX_SPACE: ((sandbox-space))

    # ------------------------------------------------------------------
    # Service bindings
    # ------------------------------------------------------------------
    # Uncomment the services block below once a UAA service instance has
    # been created.  The bound credentials will be available via VCAP_SERVICES
    # and can be referenced in application-cloud.yml.
    #
    # To create the service instance:
    #   cf create-service p-identity standard dropship-uaa
    #
    # Then uncomment and push:
    # services:
    #   - dropship-uaa
